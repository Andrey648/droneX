<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Спасибо за заказ</title>

<style>
body{
    margin:0;
    background:#0a0a0a;
    color:#fff;
    font-family:Inter;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.box{
    animation:fade 1s ease;
}

h1{
    font-size:40px;
}

.badge{
    background:#1a1a1a;
    padding:10px 15px;
    border-radius:10px;
    display:inline-block;
    margin-top:10px;
}

@keyframes fade{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="box">
    <h1>Спасибо за заказ 🎉</h1>

    <div class="badge" id="order"></div>

    <p>Ваш заказ обрабатывается...</p>
</div>

<script>

// получаем заказ
let order = JSON.parse(localStorage.getItem('lastOrder'));

if(order){
    document.getElementById('order').innerText =
        "Заказ: " + order.id;
}

// редирект на главную
setTimeout(()=>{
    window.location.href = "сайт дрона.html";
}, 4000);

</script>

</body>
</html>
