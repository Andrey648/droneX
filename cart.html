<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>DroneX</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0a0a0a;
--card:#111;
--accent:#0071e3;
--green:#00e676;
--red:#ff4d4d;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Inter;
background:var(--bg);
color:#fff;
padding-top:90px;
padding-left:env(safe-area-inset-left);
padding-right:env(safe-area-inset-right);
}

/* NAV */
nav{
position:fixed;
top:0;
left:0;
right:0;
z-index:1000;

display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
gap:10px;

padding:12px 16px;
padding-top:calc(12px + env(safe-area-inset-top));

background:rgba(0,0,0,0.75);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.05);
}

nav a{
color:#fff;
text-decoration:none;
margin-left:10px;
opacity:0.7;
font-size:14px;
}

nav a:hover{opacity:1}

/* CONTAINER */
.container{
display:flex;
gap:20px;
max-width:1100px;
margin:0 auto;
padding:15px;
}

/* ITEMS */
.items{
flex:2;
}

.item{
display:flex;
align-items:center;
justify-content:space-between;
gap:12px;

background:var(--card);
padding:12px;
border-radius:16px;
margin-bottom:12px;
}

.item img{
width:70px;
height:70px;
object-fit:cover;
border-radius:10px;
}

.item h3{
margin:0;
font-size:14px;
}

/* CONTROLS */
.controls{
display:flex;
align-items:center;
gap:8px;
}

.controls button{
width:40px;
height:40px;
border:none;
border-radius:10px;
background:#222;
color:#fff;
font-size:18px;
cursor:pointer;
}

.controls button:active{
transform:scale(0.95);
}

.price{
font-weight:600;
white-space:nowrap;
}

.delete{
color:var(--red);
font-size:20px;
cursor:pointer;
padding:8px;
}

/* SUMMARY */
.summary{
flex:1;
background:var(--card);
padding:18px;
border-radius:16px;
height:fit-content;
position:sticky;
top:90px;
}

.total{
font-size:22px;
margin:15px 0;
color:var(--green);
font-weight:600;
}

/* BUTTON */
.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:var(--accent);
color:#fff;
font-size:16px;
cursor:pointer;
}

.btn:active{
transform:scale(0.98);
}

/* CHECKOUT */
#checkout{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
padding:20px;
}

.checkout-box{
background:#111;
width:100%;
max-width:360px;
border-radius:16px;
padding:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
background:#1a1a1a;
color:#fff;
}

/* ===== MOBILE FIX ===== */
@media(max-width:768px){

.container{
flex-direction:column;
padding:10px;
}

.item{
flex-direction:column;
align-items:flex-start;
}

.controls{
width:100%;
justify-content:space-between;
margin-top:10px;
}

.price{
margin-top:10px;
}

.summary{
position:static;
}

}

/* tap fix */
button,a{
-webkit-tap-highlight-color:transparent;
touch-action:manipulation;
}

</style>
</head>

<body>

<nav>
<div>DroneX</div>
<div>
<a href="index.html">Главная</a>
<a href="cart.html">Корзина</a>
<a href="account.html">Кабинет</a>
</div>
</nav>

<div class="container">

<div class="items" id="items"></div>

<div class="summary">
<h2>Корзина</h2>
<div class="total" id="total">0 ₽</div>
<button class="btn" onclick="openCheckout()">Оплатить</button>
</div>

</div>

<!-- CHECKOUT -->
<div id="checkout">
<div class="checkout-box">

<h2>Оплата</h2>

<input id="email" placeholder="Email">
<input placeholder="Card number">
<input placeholder="MM/YY">
<input placeholder="CVC">

<button class="btn" onclick="pay()" style="margin-top:15px;">Оплатить</button>
<button class="btn" style="background:#333;margin-top:10px;" onclick="closeCheckout()">Отмена</button>

</div>
</div>

<script>

const products = {
X1:{name:"Drone X1",price:50000,img:"iFlight-Nazgul-DC5-ECO-O4-Air-Unit-Pro_spje-pd.jpg"},
X2:{name:"Drone X2",price:80000,img:"iFlight-Nazgul-DC5-ECO-O4-Air-Unit-Pro_spje-pd.jpg"},
PRO:{name:"Drone PRO",price:120000,img:"iFlight-Nazgul-DC5-ECO-O4-Air-Unit-Pro_spje-pd.jpg"}
};

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function render(){

const box = document.getElementById("items");
box.innerHTML = "";

let total = 0;

if(cart.length === 0){
box.innerHTML = "<p>Корзина пуста</p>";
document.getElementById("total").innerText = "0 ₽";
return;
}

cart.forEach((id,i)=>{

const p = products[id];
if(!p) return;

total += p.price;

const div = document.createElement("div");
div.className = "item";

div.innerHTML = `
<img src="${p.img}">

<div>
<h3>${p.name}</h3>

<div class="controls">
<button onclick="minus(${i})">−</button>
<span>1</span>
<button onclick="plus('${id}')">+</button>
</div>
</div>

<div class="price">${p.price} ₽</div>
<div class="delete" onclick="removeItem(${i})">✕</div>
`;

box.appendChild(div);
});

document.getElementById("total").innerText = total + " ₽";
}

function plus(id){
cart.push(id);
save();
}

function minus(i){
cart.splice(i,1);
save();
}

function removeItem(i){
cart.splice(i,1);
save();
}

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
render();
}

/* checkout */
function openCheckout(){
document.getElementById("checkout").style.display="flex";
}

function closeCheckout(){
document.getElementById("checkout").style.display="none";
}

function pay(){
localStorage.removeItem("cart");
cart=[];
save();
location.href="thanks.html";
}

render();

</script>

</body>
</html>
